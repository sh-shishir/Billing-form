<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
   <link rel="stylesheet" href="style.css">
   <style>
        @media screen and (max-width: 576px) {
            .emni {
                flex-direction: column-reverse;
            }
        }
    </style>
  </head>
  <body>

    <h1 class="text-center">Billing Form</h1>

<div class="container-fluid px-5">
    <div class="row emni">

        <div class="col col-12 col-md-9">

   <form class="row g-3 needs-validation" id="billingForm" novalidate>
    <h3>Billing Address</h3>
  <div class="col-md-6">
    <label for="inputEmail4" class="form-label">Fast Name</label>
    <input type="text" class="form-control" id="inputEmail4" minlength="5" required>
  </div>
  <div class="col-md-6">
    <label for="inputPassword4" class="form-label">Last Name</label>
    <input type="text" class="form-control" id="inputPassword4" required>
  </div>
  <div class="input-group">
  <span class="input-group-text" id="basic-addon1">@</span>
  <input type="text" class="form-control" placeholder="Username" aria-label="Username" aria-describedby="basic-addon1" required>
</div>
<div class="">
    <label for="exampleInputEmail1" class="form-label">Email address(Optional)</label>
    <input type="email" class="form-control" id="exampleInputEmail1" placeholder="You@gmail.com" aria-describedby="emailHelp">
  </div>
 <div class="col-12">
    <label for="inputAddress" class="form-label">Address</label>
    <input type="text" class="form-control" id="inputAddress" placeholder="1234 Main St" required>
  </div>
  <div class="col-12">
    <label for="inputAddress2" class="form-label">Address 2(Optional)</label>
    <input type="text" class="form-control" id="inputAddress2" placeholder="Apartment, studio, or floor">
  </div>
  <div class="col-md-6">
    <label for="inputCity" class="form-label">Country</label>
    
    <select class="form-select" required>
<option value="">Choose Country</option>
<option>Bangladesh</option>
<option>USA</option>
<option>Canada</option>
<option>UK</option>
</select>
  </div>

  <div class="col-md-4">
    <label for="inputState" class="form-label">State</label>
    <select id="inputState" class="form-select" required>
      <option selected>Choose State</option>
      <option>Dhaka</option>
      <option>Rajshahi</option>
    </select>
  </div>

  <div class="col-md-2 mb-4">
    <label for="inputZip" class="form-label">Zip</label>
    <input type="text" class="form-control" id="inputZip" required>
  </div> <br> <hr>

  <div class="form-check">
  <input class="form-check-input" type="checkbox" value="" id="checkDefault">
  <label class="form-check-label" for="checkDefault">
    Default checkbox
  </label>
</div>

<div class="form-check mt-">
  <input class="form-check-input" type="checkbox" value="" id="checkChecked" checked>
  <label class="form-check-label" for="checkChecked">
    Checked checkbox
  </label>
</div> <br> <br> <hr> <br>

 <h4>Payment</h4>
<div class="form-check">
<input class="form-check-input" type="radio" name="payment" required checked>
<label class="form-check-label">Credit Card</label>
</div>

<div class="form-check">
<input class="form-check-input" type="radio" name="payment">
<label class="form-check-label">Debit Card</label>
</div>

<div class="form-check">
<input class="form-check-input" type="radio" name="payment">
<label class="form-check-label">PayPal</label>
</div>

<div class="col-md-6">
    <label class="form-label">Name on Card</label>
    <input type="text" class="form-control" id="inputEmail4" required>
    <div id="emailHelp" class="form-text">Full Name of Your Card</div>
  </div>
  
  <div class="col-md-6">
    <label for="inputPassword4" class="form-label">Credit card number</label>
    <input type="number" class="form-control" id="inputPassword4"  minlength="16" maxlength="16" required>
  </div>

<div class="d-flex mb-4" style="width: 48%; gap: 10px;">
    <div class="col-md-6">
    <label for="inputEmail4" class="form-label">Expiration</label>
    <input type="number" class="form-control" id="inputEmail4" required>
  </div>
  
  <div class="col-md-6">
    <label for="inputPassword4" class="form-label">CVV</label>
    <input type="number" class="form-control" id="inputPassword4" required>
  </div>
</div> <hr>

  <div class="col-12">
    <button type="submit" class="btn btn-primary">Continue to Checkout</button>
  </div>
     </form>   
        </div>
   
        
<div class="col col-12 col-md-3">
            <h3 class="mb-4">Your Cart</h3>
             <div class="card rounded-0 p-2">
              <div class="d-flex justify-content-between">
                <span class="card-title fs-5">Product Name</span>
                <span class="card-title fs-5">12 $</span>
              </div>
              <p>Breif Description</p>
            </div>
             <div class="card rounded-0 p-2">
              <div class="d-flex justify-content-between">
                <span class="card-title fs-5">Product Name</span>
                <span class="card-title fs-5">12 $</span>
              </div>
              <p>Breif Description</p>
            </div>
             <div class="card rounded-0 p-2">
              <div class="d-flex justify-content-between">
                <span class="card-title fs-5">Product Name</span>
                <span class="card-title fs-5">12 $</span>
              </div>
              <p>Breif Description</p>
            </div>
             <div class="card rounded-0 p-2">
              <div class="d-flex justify-content-between">
                <span class="card-title fs-5 text-success">Promo Code</span>
                <span class="card-title fs-5 text-success"> -12 $</span>
              </div>
              <p class="text-success">ExampleCode</p>
            </div>
            <div class="card rounded-0 p-2 mb-3">
              <div class="d-flex justify-content-between">
                <span class="card-title fs-5 text-success fw-bold">Total USD</span>
                <span class="card-title fs-5 text-success fw-bold"> 24 $</span>
              </div>
            </div>
            <form class="card p-2 mb-2">
            <div class="input-group">   
                <input type="text" class="form-control" placeholder="Recipient's username">
                <button type="submit" class="btn btn-secondary">Redeem</button>
            </div>
           </form>
 <h4> Date&time: <span id="date"></span> <span id="time"></span></h4>
        </div>

     </div>
  
</div>

<script>

let form = document.getElementById("billingForm");

form.addEventListener("submit", function(e){

if(!form.checkValidity()){
e.preventDefault();
}

form.classList.add("was-validated");

});

</script>

<script>
        document.getElementById('date').innerHTML = new Date().toLocaleDateString();
        setInterval(() =>
             document.getElementById('time').innerHTML = new Date().toLocaleTimeString());
</script>



    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>
